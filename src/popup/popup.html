<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolderGuard | Security Alert</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --accent-color: #6c63ff;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            padding: 2.5rem;
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(108, 99, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(108, 99, 255, 0); }
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .folder-path {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            word-break: break-all;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: #2d2d44;
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(108, 99, 255, 0.3);
        }

        .error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .unlock-btn {
            background: var(--accent-color);
            color: white;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .cancel-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">🔒</div>
        <h2>Access Denied</h2>
        <div class="folder-path" id="folderName">Private Data</div>
        
        <input type="password" id="passwordInput" placeholder="Enter Folder Password" autofocus>
        <div class="error" id="errorMsg">Incorrect Password</div>

        <div class="btn-group">
            <button class="unlock-btn" id="unlockBtn">Unlock Folder</button>
            <button class="cancel-btn" id="cancelBtn">Deny Access</button>
        </div>
        
        <div style="margin-top: 2rem; font-size: 0.7rem; color: var(--text-secondary);">
            FolderGuard Security Protocol Active
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let currentFolder = null;
        const folderNameEl = document.getElementById('folderName');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const errorMsg = document.getElementById('errorMsg');

        ipcRenderer.on('show-popup', (event, folder) => {
            currentFolder = folder;
            folderNameEl.innerText = folder.name;
            passwordInput.value = '';
            errorMsg.style.display = 'none';
            passwordInput.focus();
        });

        unlockBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            if (!password) return;

            const res = await ipcRenderer.invoke('unlock-folder', { 
                folderPath: currentFolder.path, 
                password 
            });

            if (res.success) {
                // Success: Hide popup
                ipcRenderer.send('close-popup');
            } else {
                // Fail: Show error
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.classList.add('shake');
                setTimeout(() => passwordInput.classList.remove('shake'), 400);
            }
        });

        cancelBtn.addEventListener('click', () => {
            ipcRenderer.send('close-popup');
        });

        // Enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') unlockBtn.click();
        });

        // Add shake animation style
        const style = document.createElement('style');
        style.innerHTML = `
            .shake {
                animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            }
            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
